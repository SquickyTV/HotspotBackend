        .square {
                position: absolute;
                width: 100px;
                height: 100px;
                background-color: rgba(199, 95, 16, 0.1); 
                border: 1px solid rgba(208, 131, 43, 0.311);
                border-radius: 4px;
                transform: rotate(90deg);
                animation: float 25s infinite ease-in-out;
        }

        .square:nth-child(1) { top: 10%; left: 10%; animation-duration: 30s; }
        .square:nth-child(2) { top: 70%; left: 20%; animation-duration: 22s; width: 60px; height: 60px; }
        .square:nth-child(3) { top: 40%; left: 80%; animation-duration: 28s; }

                33% {

                }
